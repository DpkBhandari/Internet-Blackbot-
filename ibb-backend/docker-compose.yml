version: "3.9"
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ibb

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongo
      - redis
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
      - logs:/app/logs

  ai:
    build: ../ibb-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ../ibb-ai/.env
    volumes:
      - ai_cache:/root/.cache

volumes:
  mongo_data:
  redis_data:
  uploads:
  reports:
  logs:
  ai_cache:
